<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CyclePulse — Analizador de Rendimiento Ciclista</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#080C14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CyclePulse">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg-deep: #080C14;
  --bg-card: #0E1420;
  --bg-card2: #151D2E;
  --bg-hover: #1A2438;
  --border: #1E2A3E;
  --border-active: #F97316;
  --text-primary: #F1F5F9;
  --text-secondary: #8B9DC3;
  --text-muted: #4A5E7A;
  --accent: #F97316;
  --accent-glow: rgba(249,115,22,0.15);
  --green: #22C55E;
  --green-dim: rgba(34,197,94,0.15);
  --red: #EF4444;
  --red-dim: rgba(239,68,68,0.15);
  --blue: #3B82F6;
  --blue-dim: rgba(59,130,246,0.15);
  --purple: #A855F7;
  --purple-dim: rgba(168,85,247,0.15);
  --yellow: #EAB308;
  --yellow-dim: rgba(234,179,8,0.15);
  --cyan: #06B6D4;
  --cyan-dim: rgba(6,182,212,0.15);
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  -webkit-tap-highlight-color: transparent;
}

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ===== LAYOUT ===== */
.app-container { max-width: 1280px; margin: 0 auto; padding: 20px; }

.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px;
}
.app-logo { display: flex; align-items: center; gap: 12px; }
.app-logo .icon {
  width: 40px; height: 40px; background: var(--accent);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; box-shadow: 0 0 20px var(--accent-glow);
}
.app-logo h1 {
  font-family: 'Space Mono', monospace; font-size: 1.3rem;
  font-weight: 700; letter-spacing: -0.5px;
}
.app-logo h1 span { color: var(--accent); }
.header-stats {
  display: flex; gap: 24px; font-size: 0.78rem; color: var(--text-secondary);
}
.header-stats .stat-val { color: var(--accent); font-weight: 700; font-family: 'Space Mono', monospace; }

/* Tabs */
.tabs {
  display: flex; gap: 4px; background: var(--bg-card); border-radius: var(--radius);
  padding: 4px; margin-bottom: 24px; overflow-x: auto;
}
.tab {
  padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer;
  font-size: 0.82rem; font-weight: 500; color: var(--text-secondary);
  transition: all 0.2s; white-space: nowrap; border: none; background: none;
  font-family: 'DM Sans', sans-serif;
}
.tab:hover { color: var(--text-primary); background: var(--bg-hover); }
.tab.active {
  background: var(--accent); color: #fff; font-weight: 600;
  box-shadow: 0 2px 12px var(--accent-glow);
}

/* Cards */
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--border-active); }
.card-title {
  font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text-muted); margin-bottom: 12px; font-weight: 600;
}

/* Grid */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

/* KPI Cards */
.kpi { text-align: center; padding: 16px 12px; }
.kpi .kpi-icon { font-size: 1.4rem; margin-bottom: 6px; }
.kpi .kpi-value {
  font-family: 'Space Mono', monospace; font-size: 1.5rem;
  font-weight: 700; line-height: 1.2;
}
.kpi .kpi-label { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
.kpi .kpi-unit { font-size: 0.7rem; color: var(--text-secondary); font-weight: 400; }

/* Upload Zone */
.upload-zone {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 48px 24px; text-align: center; cursor: pointer;
  transition: all 0.3s; background: var(--bg-card);
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent); background: var(--accent-glow);
}
.upload-zone .icon { font-size: 2.5rem; margin-bottom: 12px; }
.upload-zone h3 { font-size: 1rem; margin-bottom: 6px; }
.upload-zone p { font-size: 0.78rem; color: var(--text-muted); }

/* Table */
.activity-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
.activity-table th {
  text-align: left; padding: 10px 12px; color: var(--text-muted);
  font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px;
  border-bottom: 1px solid var(--border); font-weight: 600;
}
.activity-table td {
  padding: 12px; border-bottom: 1px solid var(--border);
  font-family: 'Space Mono', monospace; font-size: 0.78rem;
}
.activity-table tr:hover td { background: var(--bg-hover); }
.activity-table .clickable { cursor: pointer; }

/* Badges */
.badge {
  display: inline-block; padding: 3px 8px; border-radius: 6px;
  font-size: 0.68rem; font-weight: 600;
}
.badge-easy { background: var(--green-dim); color: var(--green); }
.badge-moderate { background: var(--blue-dim); color: var(--blue); }
.badge-hard { background: var(--yellow-dim); color: var(--yellow); }
.badge-intense { background: var(--red-dim); color: var(--red); }
.badge-gpx { background: var(--purple-dim); color: var(--purple); }
.badge-tcx { background: var(--cyan-dim); color: var(--cyan); }
.badge-kml { background: var(--green-dim); color: var(--green); }
.badge-manual { background: var(--accent-glow); color: var(--accent); }
.badge-fit { background: var(--accent-glow); color: var(--accent); }
.badge-foto { background: rgba(236,72,153,0.15); color: #EC4899; }

/* Buttons */
.btn {
  padding: 10px 20px; border-radius: var(--radius-sm); border: none;
  font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
  font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: #EA6C0C; transform: translateY(-1px); box-shadow: 0 4px 16px var(--accent-glow); }
.btn-ghost { background: var(--bg-card2); color: var(--text-secondary); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text-primary); border-color: var(--text-muted); }
.btn-danger { background: var(--red-dim); color: var(--red); }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn-sm { padding: 6px 12px; font-size: 0.72rem; }

/* Chart container */
.chart-container { position: relative; width: 100%; height: 280px; }
.chart-container-lg { height: 350px; }

/* AI Report */
.ai-report {
  background: linear-gradient(135deg, var(--bg-card) 0%, #12192B 100%);
  border: 1px solid var(--accent); border-radius: var(--radius); padding: 24px;
}
.ai-report h3 { color: var(--accent); font-size: 1rem; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.ai-section { margin-bottom: 16px; }
.ai-section h4 { color: var(--text-primary); font-size: 0.85rem; margin-bottom: 6px; }
.ai-section p { color: var(--text-secondary); font-size: 0.82rem; line-height: 1.6; }
.ai-score {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: 'Space Mono', monospace; font-size: 2rem; font-weight: 700;
}

/* Detail View */
.detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.back-btn {
  background: var(--bg-card2); border: 1px solid var(--border); color: var(--text-secondary);
  padding: 8px 14px; border-radius: var(--radius-sm); cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 0.8rem; transition: all 0.2s;
}
.back-btn:hover { color: var(--text-primary); border-color: var(--accent); }

/* HR Zones bar */
.zone-bar { display: flex; height: 28px; border-radius: 6px; overflow: hidden; margin-bottom: 4px; }
.zone-bar div { transition: width 0.5s ease; }
.zone-labels { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--text-muted); }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
.empty-state h3 { color: var(--text-secondary); margin-bottom: 8px; }

/* File input hidden */
.file-input { display: none; }

/* Responsive */
@media (max-width: 768px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
  .header-stats { display: none; }
  .tabs { flex-wrap: nowrap; }
  .app-container { padding: 12px; }
}
@media (max-width: 480px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
}

/* Animations */
@keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
.fade-in { animation: fadeIn 0.3s ease; }

/* Progress ring */
.score-ring { position: relative; width: 100px; height: 100px; }
.score-ring svg { transform: rotate(-90deg); }
.score-ring .value {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: 'Space Mono', monospace; font-size: 1.6rem; font-weight: 700;
}

/* Notification */
.toast {
  position: fixed; bottom: 20px; right: 20px; padding: 12px 20px;
  background: var(--green); color: #fff; border-radius: var(--radius-sm);
  font-size: 0.82rem; font-weight: 600; z-index: 9999;
  animation: fadeIn 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
</style>
</head>
<body>
<div class="app-container" id="app"></div>

<script>
// ============================================================
// DATA LAYER — localStorage persistence
// ============================================================
const STORAGE_KEY = 'cyclepulse_activities';

function loadActivities() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveActivities(acts) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(acts));
}
function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

// ============================================================
// FILE PARSERS — GPX, TCX, KML
// ============================================================

// Strip ALL XML namespaces so querySelector works universally
// This is the most robust approach for Garmin, Wahoo, Polar, Suunto, Coros etc.
function stripNS(xmlStr) {
  // Remove default xmlns="..." declarations
  let s = xmlStr.replace(/\s+xmlns(?::\w+)?="[^"]*"/g, '');
  // Remove namespace prefixes from tags: <ns3:hr> → <hr>, </ns3:hr> → </hr>
  s = s.replace(/<\/?[\w]+:/g, m => m.charAt(0) === '<' && m.charAt(1) === '/' ? '</' : '<');
  // Remove xsi:schemaLocation etc
  s = s.replace(/\s+xsi:\w+="[^"]*"/g, '');
  return s;
}

function xmlParse(xmlStr) {
  const clean = stripNS(xmlStr);
  const parser = new DOMParser();
  const doc = parser.parseFromString(clean, 'text/xml');
  const err = doc.querySelector('parsererror');
  if (err) throw new Error('XML parse error: ' + err.textContent.slice(0, 200));
  return doc;
}

// Get text content of first matching child (case-insensitive tag search)
function qf(node, tag) {
  // Try direct querySelector first
  let el = node.querySelector(tag);
  if (el) return el;
  // Try case-insensitive via getElementsByTagName
  const els = node.getElementsByTagName(tag);
  return els.length > 0 ? els[0] : null;
}
function qfVal(node, tag) {
  const el = qf(node, tag);
  return el ? el.textContent.trim() : null;
}
function qfNum(node, tag) {
  const v = qfVal(node, tag);
  return v !== null ? parseFloat(v) : null;
}

function parseGPX(xmlStr) {
  const doc = xmlParse(xmlStr);
  const trkpts = doc.querySelectorAll('trkpt');
  if (trkpts.length === 0) throw new Error('No track points found in GPX');

  // Read trk-level metadata (totalTime, totalDistance from extensions)
  const trkTotalDist = qfNum(doc, 'totalDistance'); // meters
  const trkTotalTime = qfNum(doc, 'totalTime'); // seconds

  const points = [];
  let totalDist = 0, prevLat = null, prevLon = null;
  const hrValues = [], cadValues = [], speedValues = [], powerValues = [], eleValues = [];
  let startTime = null, endTime = null;

  // For large files, sample to avoid browser freeze
  const step = trkpts.length > 2000 ? Math.ceil(trkpts.length / 2000) : 1;
  const sampled = [];
  for (let i = 0; i < trkpts.length; i += step) sampled.push(trkpts[i]);
  // Always include last point
  if (sampled[sampled.length - 1] !== trkpts[trkpts.length - 1]) sampled.push(trkpts[trkpts.length - 1]);

  sampled.forEach((pt, i) => {
    const lat = parseFloat(pt.getAttribute('lat'));
    const lon = parseFloat(pt.getAttribute('lon'));
    const ele = qfNum(pt, 'ele');
    const timeStr = qfVal(pt, 'time');
    const time = timeStr ? new Date(timeStr) : null;

    if (i === 0 && time) startTime = time;
    if (time) endTime = time;

    if (prevLat !== null) totalDist += haversine(prevLat, prevLon, lat, lon);
    prevLat = lat; prevLon = lon;

    // Extensions (Garmin, Wahoo, etc) - namespace already stripped
    const hr = qfNum(pt, 'hr') || getExtVal(pt, ['hr', 'heartrate']);
    const cad = qfNum(pt, 'cad') || getExtVal(pt, ['cad', 'cadence']);
    const power = getExtVal(pt, ['power', 'watts']);
    const spd = getExtVal(pt, ['speed']);

    if (hr) hrValues.push(hr);
    if (cad) cadValues.push(cad);
    if (power) powerValues.push(power);
    if (ele !== null) eleValues.push(ele);

    let calcSpeed = null;
    if (spd) {
      calcSpeed = spd;
    } else if (i > 0 && time && points[i-1]?.time) {
      const dt = (time - points[i-1].time) / 1000;
      if (dt > 0 && dt < 60) { // skip gaps > 60s
        const dd = haversine(points[i-1].lat, points[i-1].lon, lat, lon);
        calcSpeed = (dd / dt) * 3.6;
        if (calcSpeed < 120 && calcSpeed > 0) speedValues.push(calcSpeed);
      }
    }

    points.push({ lat, lon, ele, time, hr, cad, power, speed: calcSpeed, dist: totalDist });
  });

  // Use trk-level metadata if available
  const finalDist = trkTotalDist ? trkTotalDist / 1000 : totalDist;
  const durationSec = trkTotalTime || ((startTime && endTime) ? (endTime - startTime) / 1000 : 0);

  const name = qfVal(doc, 'name') || qfVal(doc, 'type');

  return buildActivity(name, 'GPX', points, {
    totalDist: finalDist, durationSec, startTime, endTime,
    hrValues, cadValues, speedValues, powerValues, eleValues
  });
}

function parseTCX(xmlStr) {
  const doc = xmlParse(xmlStr);
  const tps = doc.querySelectorAll('Trackpoint');
  if (tps.length === 0) throw new Error('No trackpoints found in TCX');

  // Read Lap-level metadata for fallback
  const laps = doc.querySelectorAll('Lap');
  let lapTotalTime = 0, lapTotalDist = 0;
  laps.forEach(lap => {
    lapTotalTime += qfNum(lap, 'TotalTimeSeconds') || 0;
    // Get DistanceMeters that is direct child of Lap (not nested in Trackpoint)
    const children = lap.children;
    for (let c = 0; c < children.length; c++) {
      if (children[c].tagName === 'DistanceMeters') {
        lapTotalDist += parseFloat(children[c].textContent) || 0;
        break;
      }
    }
  });

  const points = [];
  let totalDist = 0, prevLat = null, prevLon = null;
  const hrValues = [], cadValues = [], speedValues = [], powerValues = [], eleValues = [];
  let startTime = null, endTime = null;
  let hasTrackpointDist = false;

  // For large files, sample to avoid browser freeze
  const step = tps.length > 2000 ? Math.ceil(tps.length / 2000) : 1;
  const sampled = [];
  for (let i = 0; i < tps.length; i += step) sampled.push(tps[i]);
  if (sampled[sampled.length - 1] !== tps[tps.length - 1]) sampled.push(tps[tps.length - 1]);

  sampled.forEach((tp, i) => {
    const posEl = qf(tp, 'Position');
    let lat = null, lon = null;
    if (posEl) {
      lat = qfNum(posEl, 'LatitudeDegrees');
      lon = qfNum(posEl, 'LongitudeDegrees');
    }

    const timeStr = qfVal(tp, 'Time');
    const time = timeStr ? new Date(timeStr) : null;
    if (i === 0 && time) startTime = time;
    if (time) endTime = time;

    const ele = qfNum(tp, 'AltitudeMeters');
    const tpDist = qfNum(tp, 'DistanceMeters');
    if (tpDist !== null) { totalDist = tpDist; hasTrackpointDist = true; }
    else if (lat !== null && prevLat !== null) {
      totalDist += haversine(prevLat, prevLon, lat, lon) * 1000;
    }

    // HR: <HeartRateBpm><Value>123</Value></HeartRateBpm>
    const hrBpm = qf(tp, 'HeartRateBpm');
    const hr = hrBpm ? qfNum(hrBpm, 'Value') : null;
    const cad = qfNum(tp, 'Cadence');
    // Extensions: Speed, Watts (namespace already stripped)
    const spd = qfNum(tp, 'Speed');
    const power = qfNum(tp, 'Watts');

    if (hr) hrValues.push(hr);
    if (cad) cadValues.push(cad);
    if (power) powerValues.push(power);
    if (ele !== null) eleValues.push(ele);

    let calcSpeed = null;
    if (spd !== null) {
      calcSpeed = spd * 3.6; // m/s → km/h
      if (calcSpeed < 120 && calcSpeed > 0) speedValues.push(calcSpeed);
    } else if (i > 0 && time && lat !== null && points[i-1]?.time && points[i-1]?.lat !== null) {
      const dt = (time - points[i-1].time) / 1000;
      if (dt > 0 && dt < 30) { // skip gaps > 30s
        const dd = haversine(points[i-1].lat, points[i-1].lon, lat, lon);
        calcSpeed = (dd / dt) * 3.6;
        if (calcSpeed < 120 && calcSpeed > 0) speedValues.push(calcSpeed);
      }
    }

    if (lat !== null) { prevLat = lat; prevLon = lon; }
    points.push({ lat, lon, ele, time, hr, cad, power, speed: calcSpeed, dist: totalDist / 1000 });
  });

  // Use Lap-level distance if trackpoints didn't have it
  let finalDist = hasTrackpointDist ? totalDist / 1000 : totalDist / 1000;
  if (lapTotalDist > 0 && !hasTrackpointDist) {
    // Recalc from haversine might be inaccurate, prefer Lap data
    const haversineDist = totalDist / 1000;
    // Use the larger of haversine vs lap (lap is usually more accurate)
    finalDist = Math.max(haversineDist, lapTotalDist / 1000);
  } else if (lapTotalDist > 0) {
    finalDist = totalDist / 1000; // already in meters from trackpoint DistanceMeters
  }

  const durationSec = (startTime && endTime) ? (endTime - startTime) / 1000 : lapTotalTime;

  // Activity name from Sport attribute or Id
  const actEl = doc.querySelector('Activity');
  let actName = actEl ? actEl.getAttribute('Sport') : null;

  return buildActivity(actName, 'TCX', points, {
    totalDist: finalDist, durationSec, startTime, endTime,
    hrValues, cadValues, speedValues, powerValues, eleValues
  });
}

function parseKML(xmlStr) {
  const doc = xmlParse(xmlStr);
  
  // Find coordinates in LineString or gx:Track
  let coordText = '';
  const coordsEl = doc.querySelector('LineString coordinates') || doc.querySelector('coordinates');
  if (coordsEl) coordText = coordsEl.textContent;
  
  const gxCoords = doc.querySelectorAll('coord');
  const gxTimes = doc.querySelectorAll('when');

  const points = [];
  let totalDist = 0, prevLat = null, prevLon = null;
  const eleValues = [], speedValues = [];
  let startTime = null, endTime = null;

  if (coordText.trim()) {
    const lines = coordText.trim().split(/\s+/);
    lines.forEach((line, i) => {
      const [lon, lat, ele] = line.split(',').map(Number);
      if (isNaN(lat) || isNaN(lon)) return;
      if (prevLat !== null) totalDist += haversine(prevLat, prevLon, lat, lon);
      prevLat = lat; prevLon = lon;
      if (ele) eleValues.push(ele);
      points.push({ lat, lon, ele: ele || null, time: null, dist: totalDist });
    });
  } else if (gxCoords.length > 0) {
    gxCoords.forEach((c, i) => {
      const parts = c.textContent.trim().split(/\s+/).map(Number);
      const [lon, lat, ele] = parts;
      if (isNaN(lat) || isNaN(lon)) return;
      const time = gxTimes[i] ? new Date(gxTimes[i].textContent) : null;
      if (i === 0 && time) startTime = time;
      if (time) endTime = time;
      if (prevLat !== null) totalDist += haversine(prevLat, prevLon, lat, lon);
      prevLat = lat; prevLon = lon;
      if (ele) eleValues.push(ele);

      let calcSpeed = null;
      if (i > 0 && time && points[i-1]?.time) {
        const dt = (time - points[i-1].time) / 1000;
        if (dt > 0) {
          const dd = haversine(points[i-1].lat, points[i-1].lon, lat, lon);
          calcSpeed = (dd / dt) * 3.6;
          if (calcSpeed < 100) speedValues.push(calcSpeed);
        }
      }
      points.push({ lat, lon, ele: ele || null, time, speed: calcSpeed, dist: totalDist });
    });
  }

  if (points.length === 0) throw new Error('No coordinates found in KML');

  const name = qfVal(doc, 'name');
  const durationSec = (startTime && endTime) ? (endTime - startTime) / 1000 : 0;

  return buildActivity(name, 'KML', points, {
    totalDist, durationSec, startTime, endTime,
    hrValues: [], cadValues: [], speedValues, powerValues: [], eleValues
  });
}

// ============================================================
// FIT FILE PARSER — Binary format (Garmin native)
// Full HR, speed, cadence, power, GPS, altitude extraction
// ============================================================
const RECORD_FIELDS = {
  0:{name:'lat',scale:11930465,offset:0},
  1:{name:'lon',scale:11930465,offset:0},
  2:{name:'altitude',scale:5,offset:500},
  3:{name:'heart_rate',scale:1,offset:0},
  4:{name:'cadence',scale:1,offset:0},
  5:{name:'distance',scale:100,offset:0},
  6:{name:'speed',scale:1000,offset:0},
  7:{name:'power',scale:1,offset:0},
  253:{name:'timestamp',scale:1,offset:0},
};
const SESSION_FIELDS = {
  7:{name:'total_elapsed_time',scale:1000,offset:0},
  8:{name:'total_timer_time',scale:1000,offset:0},
  9:{name:'total_distance',scale:100,offset:0},
  11:{name:'total_calories',scale:1,offset:0},
  14:{name:'avg_speed',scale:1000,offset:0},
  15:{name:'max_speed',scale:1000,offset:0},
  16:{name:'avg_heart_rate',scale:1,offset:0},
  17:{name:'max_heart_rate',scale:1,offset:0},
  18:{name:'avg_cadence',scale:1,offset:0},
  19:{name:'max_cadence',scale:1,offset:0},
  20:{name:'avg_power',scale:1,offset:0},
  21:{name:'max_power',scale:1,offset:0},
  22:{name:'total_ascent',scale:1,offset:0},
  23:{name:'total_descent',scale:1,offset:0},
};

function parseFIT(arrayBuffer) {
  const dv = new DataView(arrayBuffer);
  const bytes = new Uint8Array(arrayBuffer);
  const headerSize = bytes[0];
  const dataSize = dv.getUint32(4, true);
  const sig = String.fromCharCode(bytes[8],bytes[9],bytes[10],bytes[11]);
  if (sig !== '.FIT') throw new Error('No es un archivo FIT válido');

  let offset = headerSize;
  const endOffset = headerSize + dataSize;
  const localDefs = {};
  const records = [];
  let sessionData = null;
  const GARMIN_EPOCH = new Date('1989-12-31T00:00:00Z').getTime();

  while (offset < endOffset && offset < bytes.length - 1) {
    const rh = bytes[offset++];
    if (offset >= bytes.length) break;

    // Compressed timestamp header
    if (rh & 0x80) {
      const lmt = (rh >> 5) & 0x3;
      const def = localDefs[lmt];
      if (def) { let s=0; for(const f of def.fields) s+=f.size; offset+=s; }
      continue;
    }

    const isDef = (rh & 0x40) !== 0;
    const lmt = rh & 0x0F;

    if (isDef) {
      if (offset+5 > bytes.length) break;
      offset++; // reserved
      const arch = bytes[offset++];
      const isLE = arch === 0;
      const gmn = isLE ? dv.getUint16(offset,true) : dv.getUint16(offset,false);
      offset += 2;
      const nf = bytes[offset++];
      const fields = [];
      for (let i=0; i<nf; i++) {
        if (offset+3>bytes.length) break;
        fields.push({defNum:bytes[offset++], size:bytes[offset++], baseType:bytes[offset++], isLE});
      }
      if (rh & 0x20) {
        if (offset<bytes.length) {
          const nd=bytes[offset++];
          for(let i=0;i<nd;i++){if(offset+3>bytes.length)break;offset+=3;}
        }
      }
      localDefs[lmt] = {globalMesgNum:gmn, fields, architecture:arch};
    } else {
      const def = localDefs[lmt];
      if (!def) break;
      const fv = {};
      const isLE = def.architecture === 0;

      for (const f of def.fields) {
        if (offset+f.size>bytes.length){offset=bytes.length;break;}
        let val=null;
        const bt = f.baseType & 0x1F;
        try {
          if (f.size===1) {
            // Always read as unsigned first
            val = bytes[offset];
            // Invalid markers: 0xFF for unsigned types (0=enum,2=uint8,10=uint8z,13=byte), 0x7F for sint8(1)
            if(val===0xFF && bt!==1) val=null;
            else if(bt===1 && val===0x7F) val=null;
            // Convert to signed for sint8
            else if(bt===1 && val>127) val=val-256;
          } else if (f.size===2) {
            val = isLE ? dv.getUint16(offset,true) : dv.getUint16(offset,false);
            if(val===0xFFFF) val=null;
          } else if (f.size===4) {
            val = isLE ? dv.getUint32(offset,true) : dv.getUint32(offset,false);
            if(val===0xFFFFFFFF) val=null;
            if(f.defNum<=1 && def.globalMesgNum===20 && val!==null && val>0x7FFFFFFF) val=val-0x100000000;
          }
        } catch(e){val=null;}
        offset += f.size;
        if (val!==null) fv[f.defNum]=val;
      }

      if (def.globalMesgNum===20) {
        const rec={};
        for (const [dn,rv] of Object.entries(fv)) {
          const fd = RECORD_FIELDS[parseInt(dn)];
          if(fd){
            let v=rv;
            if(fd.name==='lat'||fd.name==='lon') v=v/fd.scale;
            else if(fd.name==='altitude') v=v/fd.scale-fd.offset;
            else if(fd.name==='timestamp') v=new Date(GARMIN_EPOCH+v*1000);
            else if(fd.scale!==1) v=v/fd.scale;
            rec[fd.name]=v;
          }
        }
        if(Object.keys(rec).length>0) records.push(rec);
      }
      if (def.globalMesgNum===18) {
        sessionData={};
        for(const[dn,rv] of Object.entries(fv)){
          const fd=SESSION_FIELDS[parseInt(dn)];
          if(fd){let v=rv;if(fd.scale!==1)v=v/fd.scale;sessionData[fd.name]=v;}
        }
      }
    }
  }

  if (records.length===0) throw new Error('No se encontraron registros en el archivo FIT');

  // Build activity from records
  const points=[];
  let totalDist=0, prevLat=null, prevLon=null;
  const hrValues=[], cadValues=[], speedValues=[], powerValues=[], eleValues=[];
  let startTime=null, endTime=null;

  const step = records.length>2000 ? Math.ceil(records.length/2000) : 1;
  const sampled=[];
  for(let i=0;i<records.length;i+=step) sampled.push(records[i]);
  if(sampled[sampled.length-1]!==records[records.length-1]) sampled.push(records[records.length-1]);

  sampled.forEach((rec,i) => {
    const lat=rec.lat, lon=rec.lon, ele=rec.altitude;
    const time = rec.timestamp instanceof Date ? rec.timestamp : null;
    if(i===0 && time) startTime=time;
    if(time) endTime=time;

    if(lat!==undefined && lon!==undefined && prevLat!==null) totalDist+=haversine(prevLat,prevLon,lat,lon);
    if(lat!==undefined){prevLat=lat;prevLon=lon;}

    if(rec.heart_rate>30 && rec.heart_rate<250) hrValues.push(rec.heart_rate);
    if(rec.cadence>0 && rec.cadence<200) cadValues.push(rec.cadence);
    if(rec.power>0 && rec.power<3000) powerValues.push(rec.power);
    if(ele!==undefined && ele>-500 && ele<9000) eleValues.push(ele);

    let calcSpeed=null;
    if(rec.speed>0){calcSpeed=rec.speed*3.6;if(calcSpeed<120)speedValues.push(calcSpeed);}

    points.push({lat:lat||null,lon:lon||null,ele:ele||null,time,hr:rec.heart_rate||null,
      cad:rec.cadence||null,power:rec.power||null,speed:calcSpeed,dist:rec.distance?rec.distance/1000:totalDist});
  });

  let finalDist=totalDist;
  let durationSec=(startTime&&endTime)?(endTime-startTime)/1000:0;

  if(sessionData){
    if(sessionData.total_distance>0) finalDist=sessionData.total_distance/1000;
    if(sessionData.total_timer_time>0) durationSec=sessionData.total_timer_time;
  }

  const activity = buildActivity('Actividad Garmin FIT','FIT',points,{
    totalDist:finalDist,durationSec,startTime,endTime,hrValues,cadValues,speedValues,powerValues,eleValues
  });

  // Log for debugging
  console.log('[FIT] Records:', records.length, '| HR values:', hrValues.length, '| Speed:', speedValues.length, '| Ele:', eleValues.length, '| Cad:', cadValues.length, '| Power:', powerValues.length);
  if (hrValues.length > 0) console.log('[FIT] HR range:', Math.min(...hrValues), '-', Math.max(...hrValues), 'avg:', Math.round(hrValues.reduce((a,b)=>a+b,0)/hrValues.length));

  // Enrich with session aggregates
  if(sessionData){
    if(sessionData.total_calories>0) activity.calories=Math.round(sessionData.total_calories);
    if(sessionData.total_ascent>0 && activity.elevGain===0) activity.elevGain=Math.round(sessionData.total_ascent);
    if(sessionData.total_descent>0 && activity.elevLoss===0) activity.elevLoss=Math.round(sessionData.total_descent);
    if(sessionData.avg_heart_rate>0 && activity.avgHR===0) activity.avgHR=Math.round(sessionData.avg_heart_rate);
    if(sessionData.max_heart_rate>0 && activity.maxHR===0) activity.maxHR=Math.round(sessionData.max_heart_rate);
    if(sessionData.avg_speed>0 && activity.avgSpeed===0) activity.avgSpeed=Math.round(sessionData.avg_speed*3.6*10)/10;
    if(sessionData.max_speed>0 && activity.maxSpeed===0) activity.maxSpeed=Math.round(sessionData.max_speed*3.6*10)/10;
    if(sessionData.avg_cadence>0 && activity.avgCadence===0) activity.avgCadence=Math.round(sessionData.avg_cadence);
    if(sessionData.avg_power>0 && activity.avgPower===0) activity.avgPower=Math.round(sessionData.avg_power);
    if(sessionData.max_power>0 && activity.maxPower===0) activity.maxPower=Math.round(sessionData.max_power);
  }

  return activity;
}

// ============================================================
// HELPERS
// ============================================================
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getExtVal(node, names) {
  for (const name of names) {
    const el = node.querySelector(name) || node.querySelector(`extensions ${name}`);
    if (el) { const v = parseFloat(el.textContent); if (!isNaN(v)) return v; }
  }
  // Also check all extensions children
  const exts = node.querySelectorAll('extensions *');
  for (const ext of exts) {
    const tag = ext.tagName.toLowerCase().split(':').pop();
    for (const n of names) {
      if (tag === n.toLowerCase().split(':').pop()) {
        const v = parseFloat(ext.textContent);
        if (!isNaN(v)) return v;
      }
    }
  }
  return null;
}

function buildActivity(name, format, points, data) {
  const { totalDist, durationSec, startTime, endTime, hrValues, cadValues, speedValues, powerValues, eleValues } = data;
  const avg = arr => arr.length ? arr.reduce((a,b) => a+b, 0) / arr.length : 0;
  const max = arr => arr.length ? Math.max(...arr) : 0;
  const min = arr => arr.length ? Math.min(...arr) : 0;

  // Smooth speed values (moving average, window=5)
  const smoothedSpeed = smoothArray(speedValues, 5);

  // Elevation gain
  let elevGain = 0, elevLoss = 0;
  for (let i = 1; i < eleValues.length; i++) {
    const diff = eleValues[i] - eleValues[i-1];
    if (diff > 0.5) elevGain += diff;
    else if (diff < -0.5) elevLoss += Math.abs(diff);
  }

  // Downsample points for chart (max 300 points)
  const chartPoints = downsample(points, 300);

  // === Build synchronized chart arrays from points ===
  // Each point has: lat, lon, ele, time, hr, cad, power, speed, dist
  // We downsample points and extract all channels with matching time/dist labels
  const syncPts = downsample(points.filter(p => p.time || p.dist !== undefined), 300);
  const chartTime = []; // "H:MM:SS" labels
  const chartDist = []; // "X.X km" labels
  const syncHR = [], syncSpeed = [], syncEle = [], syncCad = [], syncPower = [];

  syncPts.forEach(p => {
    // Time label
    if (p.time && startTime) {
      const sec = (p.time - startTime) / 1000;
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = Math.floor(sec % 60);
      chartTime.push(h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${m}:${String(s).padStart(2,'0')}`);
    } else {
      chartTime.push('');
    }
    // Dist label
    const d = p.dist !== undefined ? p.dist : null;
    chartDist.push(d !== null ? d.toFixed(1) : '');

    syncHR.push(p.hr > 0 ? p.hr : null);
    syncSpeed.push(p.speed > 0 && p.speed < 120 ? Math.round(p.speed * 10) / 10 : null);
    syncEle.push(p.ele !== null && p.ele !== undefined ? Math.round(p.ele) : null);
    syncCad.push(p.cad > 0 ? p.cad : null);
    syncPower.push(p.power > 0 ? p.power : null);
  });

  // Calculate avgSpeed: prefer distance/duration over point-by-point average
  const durationHours = durationSec / 3600;
  const calcAvgSpeed = (totalDist > 0 && durationHours > 0) ? totalDist / durationHours : 0;
  const finalAvgSpeed = calcAvgSpeed > 0 ? calcAvgSpeed : avg(smoothedSpeed);
  // Max speed: use 95th percentile to filter GPS spikes
  const sortedSpeeds = [...smoothedSpeed].sort((a,b) => a - b);
  const p95Speed = sortedSpeeds.length > 10 ? sortedSpeeds[Math.floor(sortedSpeeds.length * 0.95)] : max(smoothedSpeed);

  // Use synced arrays if they have data, otherwise fall back to independent downsampled arrays
  const finalHR = syncHR.some(v => v !== null) ? syncHR : downsampleArr(hrValues, 300);
  const finalSpeed = syncSpeed.some(v => v !== null) ? syncSpeed : downsampleArr(smoothedSpeed, 300);
  const finalEle = syncEle.some(v => v !== null) ? syncEle : downsampleArr(eleValues, 300);
  const finalCad = syncCad.some(v => v !== null) ? syncCad : downsampleArr(cadValues, 300);
  const finalPower = syncPower.some(v => v !== null) ? syncPower : downsampleArr(powerValues, 300);

  return {
    id: generateId(),
    name: name || `Actividad ${format}`,
    format,
    date: startTime ? startTime.toISOString() : new Date().toISOString(),
    distance: Math.round(totalDist * 100) / 100,
    duration: Math.round(durationSec),
    avgSpeed: Math.round(finalAvgSpeed * 10) / 10,
    maxSpeed: Math.round(p95Speed * 10) / 10,
    avgHR: Math.round(avg(hrValues)),
    maxHR: Math.round(max(hrValues)),
    avgCadence: Math.round(avg(cadValues)),
    avgPower: Math.round(avg(powerValues)),
    maxPower: Math.round(max(powerValues)),
    elevGain: Math.round(elevGain),
    elevLoss: Math.round(elevLoss),
    maxEle: Math.round(max(eleValues)),
    minEle: eleValues.length ? Math.round(min(eleValues)) : 0,
    calories: Math.round(durationSec / 3600 * avg(hrValues) * 0.05 * 75) || Math.round(totalDist * 30),
    chartPoints,
    chartTime,
    chartDist,
    hrValues: finalHR,
    speedChart: finalSpeed,
    eleChart: finalEle,
    cadChart: finalCad,
    powerChart: finalPower,
  };
}

// Moving average smoothing
function smoothArray(arr, window) {
  if (arr.length < window) return arr;
  const result = [];
  const half = Math.floor(window / 2);
  for (let i = 0; i < arr.length; i++) {
    let sum = 0, count = 0;
    for (let j = Math.max(0, i - half); j <= Math.min(arr.length - 1, i + half); j++) {
      sum += arr[j]; count++;
    }
    result.push(sum / count);
  }
  return result;
}

function downsample(arr, maxPts) {
  if (arr.length <= maxPts) return arr;
  const step = arr.length / maxPts;
  const result = [];
  for (let i = 0; i < maxPts; i++) result.push(arr[Math.floor(i * step)]);
  return result;
}

function downsampleArr(arr, maxPts) {
  if (arr.length <= maxPts) return arr;
  const step = arr.length / maxPts;
  const result = [];
  for (let i = 0; i < maxPts; i++) result.push(arr[Math.floor(i * step)]);
  return result;
}

function formatDuration(sec) {
  if (!sec) return '--:--';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  return h > 0 ? `${h}h ${m.toString().padStart(2,'0')}m` : `${m}m ${s.toString().padStart(2,'0')}s`;
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' });
}

function intensityLevel(avgHR, maxHR) {
  if (!avgHR) return { label: 'N/A', cls: 'badge-easy' };
  const ratio = maxHR > 0 ? avgHR / maxHR : avgHR / 190;
  if (ratio < 0.6) return { label: 'Recuperación', cls: 'badge-easy' };
  if (ratio < 0.72) return { label: 'Moderado', cls: 'badge-moderate' };
  if (ratio < 0.82) return { label: 'Umbral', cls: 'badge-hard' };
  return { label: 'Alta Intensidad', cls: 'badge-intense' };
}

// ============================================================
// AI ANALYSIS ENGINE
// ============================================================
function generateAIAnalysis(activities) {
  if (activities.length === 0) return null;

  const totalDist = activities.reduce((s,a) => s + a.distance, 0);
  const totalDur = activities.reduce((s,a) => s + a.duration, 0);
  const totalElev = activities.reduce((s,a) => s + a.elevGain, 0);
  const avgDist = totalDist / activities.length;
  const avgHR = activities.filter(a => a.avgHR > 0).reduce((s,a) => s + a.avgHR, 0) / (activities.filter(a => a.avgHR > 0).length || 1);
  const avgSpeed = activities.filter(a => a.avgSpeed > 0).reduce((s,a) => s + a.avgSpeed, 0) / (activities.filter(a => a.avgSpeed > 0).length || 1);
  const maxSpeedAll = Math.max(...activities.map(a => a.maxSpeed));
  const avgElevPerRide = totalElev / activities.length;
  const hasPower = activities.some(a => a.avgPower > 0);
  const avgPower = hasPower ? activities.filter(a => a.avgPower > 0).reduce((s,a) => s + a.avgPower, 0) / activities.filter(a => a.avgPower > 0).length : 0;

  // Sort by date for trend analysis
  const sorted = [...activities].sort((a,b) => new Date(a.date) - new Date(b.date));
  const recentHalf = sorted.slice(Math.floor(sorted.length / 2));
  const olderHalf = sorted.slice(0, Math.floor(sorted.length / 2));

  const recentAvgSpeed = recentHalf.filter(a=>a.avgSpeed>0).length ? recentHalf.filter(a=>a.avgSpeed>0).reduce((s,a)=>s+a.avgSpeed,0) / recentHalf.filter(a=>a.avgSpeed>0).length : 0;
  const olderAvgSpeed = olderHalf.filter(a=>a.avgSpeed>0).length ? olderHalf.filter(a=>a.avgSpeed>0).reduce((s,a)=>s+a.avgSpeed,0) / olderHalf.filter(a=>a.avgSpeed>0).length : 0;
  const speedTrend = olderAvgSpeed > 0 ? ((recentAvgSpeed - olderAvgSpeed) / olderAvgSpeed * 100) : 0;

  // Fitness Score (0-100)
  let score = 50;
  // Volume bonus
  if (totalDist > 500) score += 10; else if (totalDist > 200) score += 6; else if (totalDist > 100) score += 3;
  // Frequency bonus
  if (activities.length >= 12) score += 8; else if (activities.length >= 6) score += 5; else if (activities.length >= 3) score += 2;
  // Speed bonus
  if (avgSpeed > 28) score += 10; else if (avgSpeed > 24) score += 7; else if (avgSpeed > 20) score += 4;
  // Elevation bonus
  if (avgElevPerRide > 800) score += 8; else if (avgElevPerRide > 400) score += 5; else if (avgElevPerRide > 200) score += 3;
  // Power bonus
  if (avgPower > 250) score += 8; else if (avgPower > 200) score += 5; else if (avgPower > 150) score += 3;
  // Trend bonus
  if (speedTrend > 5) score += 5; else if (speedTrend > 0) score += 2; else if (speedTrend < -5) score -= 3;
  // HR efficiency
  if (avgHR > 0 && avgSpeed > 0) {
    const efficiency = avgSpeed / avgHR;
    if (efficiency > 0.18) score += 6; else if (efficiency > 0.14) score += 3;
  }

  score = Math.min(100, Math.max(10, Math.round(score)));

  // HR Zones estimation (based on max HR seen or estimated)
  const estMaxHR = Math.max(...activities.filter(a=>a.maxHR>0).map(a=>a.maxHR), 190);
  const zones = [
    { name: 'Z1 Recuperación', min: 0, max: Math.round(estMaxHR * 0.6), color: '#94A3B8', pct: 0 },
    { name: 'Z2 Resistencia', min: Math.round(estMaxHR * 0.6), max: Math.round(estMaxHR * 0.7), color: '#3B82F6', pct: 0 },
    { name: 'Z3 Tempo', min: Math.round(estMaxHR * 0.7), max: Math.round(estMaxHR * 0.8), color: '#22C55E', pct: 0 },
    { name: 'Z4 Umbral', min: Math.round(estMaxHR * 0.8), max: Math.round(estMaxHR * 0.9), color: '#EAB308', pct: 0 },
    { name: 'Z5 VO2max', min: Math.round(estMaxHR * 0.9), max: estMaxHR, color: '#EF4444', pct: 0 },
  ];

  // Classify avg HR of each activity into zones
  activities.filter(a => a.avgHR > 0).forEach(a => {
    for (let i = zones.length - 1; i >= 0; i--) {
      if (a.avgHR >= zones[i].min) { zones[i].pct++; break; }
    }
  });
  const totalZone = zones.reduce((s,z) => s + z.pct, 0) || 1;
  zones.forEach(z => z.pct = Math.round(z.pct / totalZone * 100));

  // Generate text analysis
  const strengths = [];
  const improvements = [];
  const recommendations = [];

  if (avgSpeed > 25) strengths.push('Velocidad media excelente, lo que indica buena potencia aeróbica y eficiencia pedaleando.');
  else if (avgSpeed > 20) strengths.push('Velocidad media sólida que indica una buena base de fitness.');
  else improvements.push('Tu velocidad media tiene margen de mejora. Incorpora series de tempo (Z3-Z4) de 10-20 minutos.');

  if (avgElevPerRide > 500) strengths.push('Gran desnivel acumulado por salida — excelente trabajo de fuerza en subida.');
  if (totalDist > 300) strengths.push('Buen volumen acumulado, lo que construye una base aeróbica sólida.');
  else improvements.push('Aumenta el volumen semanal gradualmente (10% por semana) para mejorar tu resistencia base.');

  if (avgHR > 0 && avgHR < estMaxHR * 0.72) strengths.push('Tu FC media indica buena eficiencia cardiovascular — puedes producir velocidad con menor coste cardíaco.');
  else if (avgHR > estMaxHR * 0.82) improvements.push('Tu FC media es alta. Incluye más sesiones en Z2 (endurance) para desarrollar eficiencia aeróbica.');

  if (hasPower && avgPower > 200) strengths.push(`Potencia media de ${Math.round(avgPower)}W — indicador de buena capacidad muscular.`);

  if (speedTrend > 3) strengths.push(`Tendencia positiva: tu velocidad media ha mejorado un ${speedTrend.toFixed(1)}% en tus salidas recientes.`);
  else if (speedTrend < -3) improvements.push(`Se detecta una tendencia descendente en velocidad (${speedTrend.toFixed(1)}%). Revisa recuperación, nutrición y calidad del sueño.`);

  // Zone-based recommendations
  if (zones[1].pct < 30) recommendations.push('Aumenta el trabajo en Z2 (60-70% FC máx). Es la zona que más desarrolla tu base aeróbica. Objetivo: 2-3 salidas/semana de 1-2h en Z2.');
  if (zones[3].pct < 10 && score > 50) recommendations.push('Introduce 1 sesión semanal de intervalos en umbral (Z4): 4x8min con 4min de recuperación. Mejorará tu FTP significativamente.');
  if (zones[4].pct > 30) recommendations.push('Demasiado tiempo en Z5. Reduce la intensidad máxima y prioriza Z2-Z3 para evitar sobreentrenamiento.');

  recommendations.push('Mantén una periodización: 3 semanas de carga progresiva + 1 semana de descarga (60% volumen).');
  if (!hasPower) recommendations.push('Considera invertir en un potenciómetro. La potencia es la métrica más precisa para controlar entrenamiento y progresión.');

  // Nutrition advice
  const nutritionAdvice = [];
  const avgCal = activities.reduce((s,a)=>s+a.calories,0) / activities.length;
  nutritionAdvice.push(`Con un gasto medio de ~${Math.round(avgCal)} kcal/salida, asegura una ingesta de 1.2-1.5g/kg de proteína para recuperación muscular.`);
  if (avgDist > 50) nutritionAdvice.push('Para salidas >50km: consume 60-90g de carbohidratos/hora durante el esfuerzo (geles, barritas, o bebida isotónica).');
  nutritionAdvice.push('Hidratación: 500-750ml/hora según temperatura. En verano añade electrolitos (sodio 500-700mg/L).');
  nutritionAdvice.push('Post-entreno: ventana de 30-60min para recargar glucógeno. Ratio ideal 3:1 carbohidratos:proteína.');

  return {
    score, speedTrend, zones, strengths, improvements, recommendations, nutritionAdvice,
    totalDist, totalDur, totalElev, avgSpeed, avgHR, maxSpeedAll, avgPower,
    activitiesCount: activities.length, estMaxHR
  };
}

const chartInstances = {};

function destroyChart(id) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
}

function createLineChart(canvasId, datasets, labels, options = {}) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId)?.getContext('2d');
  if (!ctx) return;

  const defaults = {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: datasets.length > 1, labels: { color: '#8B9DC3', font: { family: 'DM Sans', size: 11 }, boxWidth: 12, padding: 16 } },
      tooltip: { backgroundColor: '#1E293B', titleColor: '#F1F5F9', bodyColor: '#8B9DC3', borderColor: '#1E2A3E', borderWidth: 1, cornerRadius: 8, padding: 10, titleFont: { family: 'Space Mono', size: 12 }, bodyFont: { family: 'DM Sans', size: 11 },
        callbacks: {
          title: function(items) {
            if (!items.length) return '';
            const idx = items[0].dataIndex;
            const a = state.selectedActivity;
            if (a && a.chartTime && a.chartDist) {
              const t = a.chartTime[idx] || '';
              const d = a.chartDist[idx] || '';
              if (t && d) return t + ' · ' + d + ' km';
              if (t) return t;
              if (d) return d + ' km';
            }
            return items[0].label || '';
          }
        }
      }
    },
    scales: {
      x: { display: true, grid: { color: 'rgba(30,42,62,0.5)', drawBorder: false }, ticks: { color: '#4A5E7A', font: { family: 'DM Sans', size: 10 }, maxTicksLimit: 8 } },
      y: { grid: { color: 'rgba(30,42,62,0.5)', drawBorder: false }, ticks: { color: '#4A5E7A', font: { family: 'Space Mono', size: 10 } } }
    },
    elements: { point: { radius: 0, hoverRadius: 4 }, line: { tension: 0.3 } }
  };

  // Merge y-axis options
  if (options.yAxes) {
    delete defaults.scales.y;
    Object.assign(defaults.scales, options.yAxes);
  }

  chartInstances[canvasId] = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: defaults
  });
}

function createBarChart(canvasId, dataset, labels) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId)?.getContext('2d');
  if (!ctx) return;

  chartInstances[canvasId] = new Chart(ctx, {

async function handleFiles(files) {
  let imported = 0;
  const errors = [];
  const imageFiles = [];

  for (const file of files) {
    try {
      const ext = file.name.split('.').pop().toLowerCase();
      const isImage = ['png','jpg','jpeg','webp','gif'].includes(ext) || file.type.startsWith('image/');

      if (isImage) {
        imageFiles.push(file);
        continue;
      }

      let activity;
      if (ext === 'fit') {
        const buf = await file.arrayBuffer();
        activity = parseFIT(buf);
      } else {
        const text = await file.text();
        if (ext === 'gpx') activity = parseGPX(text);
        else if (ext === 'tcx') activity = parseTCX(text);
        else if (ext === 'kml') activity = parseKML(text);
        else { errors.push(`${file.name}: formato .${ext} no soportado`); continue; }
      }

      activity.name = file.name.replace(/\.\w+$/, '');
      // Show what data was found
      const dataParts = [];
      if (activity.hrValues?.length > 0) dataParts.push(`💓FC:${activity.hrValues.length}pts`);
      if (activity.speedChart?.length > 0) dataParts.push(`💨Vel:${activity.speedChart.length}pts`);
      if (activity.eleChart?.length > 0) dataParts.push(`⛰️Ele:${activity.eleChart.length}pts`);
      if (activity.cadChart?.length > 0) dataParts.push(`🔄Cad:${activity.cadChart.length}pts`);
      if (activity.powerChart?.length > 0) dataParts.push(`⚡Pot:${activity.powerChart.length}pts`);
      activity._dataInfo = dataParts.join(' ');
      state.activities.push(activity);
      imported++;
    } catch (e) {
      console.error('Error parsing', file.name, e);
      errors.push(`${file.name}: ${e.message}`);
    }
  }

  if (imported > 0) {
    saveActivities(state.activities);
    state.currentTab = 'dashboard';
    const lastAct = state.activities[state.activities.length - 1];
    const info = lastAct._dataInfo || '';
    showToast(`✅ ${imported} actividad${imported > 1 ? 'es' : ''} importada${imported > 1 ? 's' : ''}${info ? ' · ' + info : ''}`);
  }
  if (errors.length > 0) {
    showToast('⚠️ Error: ' + errors.join(' | '));
  }

  // Process images via AI (one at a time)
  if (imageFiles.length > 0) {
    showToast(`🤖 Analizando ${imageFiles.length} imagen${imageFiles.length > 1 ? 'es' : ''} con IA...`);
    for (const imgFile of imageFiles) {
      await processImageFile(imgFile);
    }
  }
}

async function processImageFile(file) {
  return new Promise((resolve) => {
    const ext = file.name.split('.').pop().toLowerCase();
    const typeMap = { png:'image/png', jpg:'image/jpeg', jpeg:'image/jpeg', webp:'image/webp', gif:'image/gif' };
    const mediaType = file.type || typeMap[ext] || 'image/jpeg';

    const reader = new FileReader();
    reader.onload = async (e) => {
      const base64 = e.target.result.split(',')[1];

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 4000,
            messages: [{
              role: 'user',
              content: [
                { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
                { type: 'text', text: AI_EXTRACT_PROMPT }
              ]
            }]
          })
        });

        const data = await response.json();
        const text = data.content?.map(b => b.type === 'text' ? b.text : '').join('') || '';
        const clean = text.replace(/```json|```/g, '').trim();
        const result = JSON.parse(clean);

        const activity = buildActivityFromAI(result, file.name);
        state.activities.push(activity);
        saveActivities(state.activities);
        state.currentTab = 'dashboard';
        showToast(`✅ ${activity.name} — importada desde foto`);
        render();
      } catch (err) {
        console.error('AI image error:', err);
        state.photoPreview = e.target.result;
        photoBase64 = base64;
        photoMediaType = mediaType;
        state.currentTab = 'manual';
        showToast('⚠️ No se pudo analizar automáticamente. Usa el botón manualmente.');
        render();
      }
      resolve();
    };
    reader.onerror = () => { showToast('⚠️ Error leyendo ' + file.name); resolve(); };
    reader.readAsDataURL(file);
  });
}

// Shared AI prompt for image extraction
const AI_EXTRACT_PROMPT = `Analiza esta captura de pantalla de una app de ciclismo/fitness. Extrae TODOS los datos visibles.

IMPORTANTE: Si hay gráficas visibles (frecuencia cardíaca, velocidad, elevación, potencia, cadencia), lee la curva y genera un array de ~50 puntos estimados que reproduzcan la forma visual del gráfico. Lee los valores del eje Y y sigue la línea del gráfico de izquierda a derecha, muestreando ~50 puntos equiespaciados.

Devuelve SOLO un JSON (sin markdown, sin backticks, sin texto adicional):
{
  "name": "string",
  "date": "YYYY-MM-DD o null",
  "distance_km": number|null,
  "duration": "HH:MM:SS o null",
  "avg_speed_kmh": number|null,
  "max_speed_kmh": number|null,
  "avg_hr_bpm": number|null,
  "max_hr_bpm": number|null,
  "calories": number|null,
  "elevation_m": number|null,
  "cadence_rpm": number|null,
  "avg_power_w": number|null,
  "max_power_w": number|null,
  "hr_curve": [array de ~50 números estimados de la gráfica de FC si existe, o null],
  "speed_curve": [array de ~50 números si hay gráfica de velocidad, o null],
  "elevation_curve": [array si hay gráfica de elevación, o null],
  "power_curve": [array si hay gráfica de potencia, o null],
  "cadence_curve": [array si hay gráfica de cadencia, o null],
  "hr_zones": [{"name":"nombre zona","minutes":number,"color":"hex color"}] o null,
  "coach_comment": "Un párrafo en español como coach ciclista experto: valora eficiencia cardiovascular (vel/FC), distribución de zonas, y da un consejo concreto de mejora."
}
Usa punto como decimal. Si un dato no es visible pon null.`;

function buildActivityFromAI(result, fileName) {
  const dist = result.distance_km || 0;
  let durationSec = 0;
  if (result.duration) {
    const parts = result.duration.split(':').map(Number);
    if (parts.length === 3) durationSec = parts[0]*3600 + parts[1]*60 + parts[2];
    else if (parts.length === 2) durationSec = parts[0]*60 + parts[1];
  }
  const avgSpeed = result.avg_speed_kmh || (dist > 0 && durationSec > 0 ? dist / (durationSec/3600) : 0);

  return {
    id: generateId(),
    name: result.name || fileName?.replace(/\.\w+$/, '') || 'Actividad Foto',
    format: 'FOTO',
    date: result.date ? new Date(result.date).toISOString() : new Date().toISOString(),
    distance: dist,
    duration: durationSec,
    avgSpeed: Math.round(avgSpeed * 10) / 10,
    maxSpeed: result.max_speed_kmh || Math.round(avgSpeed * 1.4 * 10) / 10,
    avgHR: result.avg_hr_bpm || 0,
    maxHR: result.max_hr_bpm || 0,
    avgCadence: result.cadence_rpm || 0,
    avgPower: result.avg_power_w || 0,
    maxPower: result.max_power_w || 0,
    elevGain: result.elevation_m || 0,
    elevLoss: 0, maxEle: 0, minEle: 0,
    calories: result.calories || Math.round(dist * 30),
    chartPoints: [],
    hrValues: result.hr_curve || [],
    speedChart: result.speed_curve || [],
    eleChart: result.elevation_curve || [],
    cadChart: result.cadence_curve || [],
    powerChart: result.power_curve || [],
    hrZones: result.hr_zones || null,
    aiComment: result.coach_comment || null,
  };
}

// ============================================================
// PHOTO AI EXTRACTION (Claude API)
// ============================================================
let photoBase64 = null;
let photoMediaType = 'image/png';

function handlePhotoSelect(file) {
  if (!file) return;
  // Detect media type robustly
  const ext = file.name.split('.').pop().toLowerCase();
  const typeMap = { png:'image/png', jpg:'image/jpeg', jpeg:'image/jpeg', webp:'image/webp', gif:'image/gif' };
  photoMediaType = file.type || typeMap[ext] || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = (e) => {
    state.photoPreview = e.target.result;
    photoBase64 = e.target.result.split(',')[1];
    state.aiComment = null;
    render();
  };
  reader.onerror = () => { showToast('⚠️ Error leyendo la imagen'); };
  reader.readAsDataURL(file);
}

function handlePhotoDrop(event) {
  const file = event.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) handlePhotoSelect(file);
}

async function analyzePhoto() {
  if (!photoBase64) { showToast('⚠️ Primero sube una imagen'); return; }

  state.photoAnalyzing = true;
  render();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: photoMediaType, data: photoBase64 } },
            { type: 'text', text: AI_EXTRACT_PROMPT }
          ]
        }]
      })
    });

    const data = await response.json();
    const text = data.content?.map(b => b.type === 'text' ? b.text : '').join('') || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);

    // Fill form fields
    state.manualForm = {
      name: result.name || '',
      date: result.date || new Date().toISOString().split('T')[0],
      dist: result.distance_km || '',
      dur: result.duration || '',
      speed: result.avg_speed_kmh || '',
      maxspeed: result.max_speed_kmh || '',
      hr: result.avg_hr_bpm || '',
      maxhr: result.max_hr_bpm || '',
      cal: result.calories || '',
      elev: result.elevation_m || '',
      cad: result.cadence_rpm || '',
      power: result.avg_power_w || '',
      maxpower: result.max_power_w || '',
    };
    // Store curve data for when saving manual activity
    state.extractedCurves = {
      hrValues: result.hr_curve || [],
      speedChart: result.speed_curve || [],
      eleChart: result.elevation_curve || [],
      cadChart: result.cadence_curve || [],
      powerChart: result.power_curve || [],
      hrZones: result.hr_zones || null,
    };
    state.aiComment = result.coach_comment || 'Datos extraídos correctamente. Revisa los campos antes de guardar.';
    state.photoAnalyzing = false;
    showToast('✅ Datos extraídos por IA con gráficas');

  } catch (err) {
    console.error('AI extraction error:', err);
    state.photoAnalyzing = false;
    showToast('⚠️ Error en extracción: ' + (err.message || 'revisa consola'));
  }

  render();
}

function saveManualActivity() {
  const val = id => document.getElementById(id)?.value?.trim() || '';
  const num = id => { const v = parseFloat(val(id)); return isNaN(v) ? 0 : v; };

  const dist = num('mf_dist');
  const durStr = val('mf_dur');
  if (dist <= 0 && !durStr) {
    showToast('⚠️ Introduce al menos distancia o duración');
    return;
  }

  // Parse duration HH:MM:SS or MM:SS
  let durationSec = 0;
  if (durStr) {
    const parts = durStr.split(':').map(Number);
    if (parts.length === 3) durationSec = parts[0]*3600 + parts[1]*60 + parts[2];
    else if (parts.length === 2) durationSec = parts[0]*60 + parts[1];
    else durationSec = parts[0] * 60;
  }

  const dateVal = val('mf_date');
  const avgSpeed = num('mf_speed') || (dist > 0 && durationSec > 0 ? dist / (durationSec/3600) : 0);

  const curves = state.extractedCurves || {};
  const hasPhoto = state.photoPreview ? true : false;

  const activity = {
    id: generateId(),
    name: val('mf_name') || 'Actividad Manual',
    format: hasPhoto ? 'FOTO' : 'MANUAL',
    date: dateVal ? new Date(dateVal).toISOString() : new Date().toISOString(),
    distance: dist,
    duration: durationSec,
    avgSpeed: Math.round(avgSpeed * 10) / 10,
    maxSpeed: num('mf_maxspeed') || Math.round(avgSpeed * 1.4 * 10) / 10,
    avgHR: num('mf_hr'),
    maxHR: num('mf_maxhr'),
    avgCadence: num('mf_cad'),
    avgPower: num('mf_power'),
    maxPower: num('mf_maxpower'),
    elevGain: num('mf_elev'),
    elevLoss: 0,
    maxEle: 0,
    minEle: 0,
    calories: num('mf_cal') || Math.round(dist * 30),
    chartPoints: [],
    hrValues: curves.hrValues || [],
    speedChart: curves.speedChart || [],
    eleChart: curves.eleChart || [],
    cadChart: curves.cadChart || [],
    powerChart: curves.powerChart || [],
    hrZones: curves.hrZones || null,
    aiComment: state.aiComment || null,
  };

  state.activities.push(activity);
  saveActivities(state.activities);
  state.manualForm = {};
  state.extractedCurves = null;
  state.photoPreview = null;
  state.aiComment = null;
  photoBase64 = null;
  state.currentTab = 'dashboard';
  showToast('✅ Actividad guardada' + (activity.hrValues.length > 0 ? ' con gráficas' : ''));
}

      <div class="grid-4">

        <div class="card kpi"><div class="kpi-icon">💪</div><div class="kpi-value">${a.maxPower > 0 ? a.maxPower : '--'}<span class="kpi-unit"> W</span></div><div class="kpi-label">Pot. Máxima</div></div>
        <div class="card kpi"><div class="kpi-icon">🔄</div><div class="kpi-value">${a.avgCadence > 0 ? a.avgCadence : '--'}<span class="kpi-unit"> rpm</span></div><div class="kpi-label">Cadencia Media</div></div>
        <div class="card kpi"><div class="kpi-icon">📊</div><div class="kpi-value">${a.avgPower > 0 && a.avgHR > 0 ? (a.avgPower / a.avgHR).toFixed(2) : '--'}</div><div class="kpi-label">Eficiencia W/bpm</div></div>
      </div>` : ''}

      ${hasHR ? `
      <div class="card">
        <div class="card-title">💓 Frecuencia Cardíaca</div>
        <div class="chart-container chart-container-lg"><canvas id="chartDetailHR"></canvas></div>
      </div>` : ''}

      ${hasSpeed ? `
      <div class="card">
        <div class="card-title">💨 Velocidad</div>
        <div class="chart-container chart-container-lg"><canvas id="chartDetailSpeed"></canvas></div>
      </div>` : ''}

      ${hasEle ? `
      <div class="card">
        <div class="card-title">⛰️ Perfil de Elevación</div>
        <div class="chart-container chart-container-lg"><canvas id="chartDetailEle"></canvas></div>
      </div>` : ''}

      ${hasPower ? `
      <div class="card">
        <div class="card-title">⚡ Potencia</div>
        <div class="chart-container chart-container-lg"><canvas id="chartDetailPower"></canvas></div>
      </div>` : ''}

      ${hasCad ? `
      <div class="card">
        <div class="card-title">🔄 Cadencia</div>
        <div class="chart-container"><canvas id="chartDetailCad"></canvas></div>
      </div>` : ''}

      ${hasHR && hasSpeed ? `
      <div class="card">
        <div class="card-title">📊 Velocidad vs Frecuencia Cardíaca (Eficiencia)</div>
        <div class="chart-container chart-container-lg"><canvas id="chartDetailEfficiency"></canvas></div>
      </div>` : ''}

      ${a.hrZones && a.hrZones.length > 0 ? `
      <div class="card">
        <div class="card-title">💓 Distribución de Zonas de FC</div>
        <div class="zone-bar">
          ${a.hrZones.map(z => {
            const totalMin = a.hrZones.reduce((s,zz) => s + (zz.minutes || 0), 0) || 1;
            const pct = Math.max(((z.minutes || 0) / totalMin * 100), 2);
            return `<div style="width:${pct}%; background:${z.color || '#666'};" title="${z.name}: ${z.minutes} min"></div>`;
          }).join('')}
        </div>
        <div style="display:flex; gap:14px; flex-wrap:wrap; margin-top:8px;">
          ${a.hrZones.map(z => `<div style="font-size:0.75rem; display:flex; align-items:center; gap:5px;">
            <div style="width:10px; height:10px; border-radius:2px; background:${z.color || '#666'};"></div>
            <span style="color:var(--text-secondary);">${z.name}</span>
            <span style="color:var(--text-primary); font-family:'Space Mono'; font-weight:700;">${Math.floor(z.minutes)}:${String(Math.round((z.minutes % 1) * 60)).padStart(2,'0')}</span>
          </div>`).join('')}
        </div>
      </div>` : ''}

      ${a.aiComment ? `
      <div class="ai-report">
        <h3 style="color:var(--accent); font-size:0.92rem;">🧠 Valoración del Coach IA</h3>
        <p style="color:var(--text-secondary); font-size:0.82rem; line-height:1.7;">${a.aiComment}</p>
      </div>` : ''}

      <div style="text-align:center; margin-top:8px;">
        <button class="btn btn-danger" onclick="deleteActivity('${a.id}')">🗑 Eliminar Actividad</button>
      </div>
    </div>
  `;
}

function renderAnalysis() {
  const report = generateAIAnalysis(state.activities);
  if (!report) {
    return `
      <div class="empty-state fade-in">
        <div class="icon">🧠</div>
        <h3>Necesitas al menos 1 actividad para el análisis</h3>
        <button class="btn btn-accent" onclick="setTab('upload')" style="margin-top:12px;">📂 Importar</button>
      </div>
    `;
  }

  const scoreColor = report.score >= 75 ? 'var(--green)' : report.score >= 50 ? 'var(--yellow)' : 'var(--red)';
  const trendIcon = report.speedTrend > 0 ? '📈' : report.speedTrend < 0 ? '📉' : '➡️';
  const trendColor = report.speedTrend > 0 ? 'var(--green)' : report.speedTrend < 0 ? 'var(--red)' : 'var(--text-muted)';

  return `
    <div class="fade-in">
      <div class="ai-report">
        <h3>🧠 Informe de Rendimiento — CyclePulse AI Coach</h3>

        <div class="grid-3" style="margin-bottom:20px;">
          <div style="text-align:center;">
            <div style="font-size:0.72rem; color:var(--text-muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:1px;">Fitness Score</div>
            <div class="ai-score" style="color:${scoreColor};">${report.score}<span style="font-size:0.8rem; color:var(--text-muted);">/100</span></div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:0.72rem; color:var(--text-muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:1px;">Tendencia Velocidad</div>
            <div class="ai-score" style="color:${trendColor}; font-size:1.4rem;">${trendIcon} ${report.speedTrend > 0 ? '+' : ''}${report.speedTrend.toFixed(1)}%</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:0.72rem; color:var(--text-muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:1px;">Actividades Analizadas</div>
            <div class="ai-score" style="color:var(--accent);">${report.activitiesCount}</div>
          </div>
        </div>

        <div class="grid-4" style="margin-bottom:20px;">
          <div class="card kpi" style="background:var(--bg-card2);">
            <div class="kpi-value" style="font-size:1.1rem;">${report.totalDist.toFixed(0)}<span class="kpi-unit"> km</span></div>
            <div class="kpi-label">Vol. Total</div>
          </div>
          <div class="card kpi" style="background:var(--bg-card2);">
            <div class="kpi-value" style="font-size:1.1rem;">${report.avgSpeed.toFixed(1)}<span class="kpi-unit"> km/h</span></div>
            <div class="kpi-label">Vel. Media Global</div>
          </div>
          <div class="card kpi" style="background:var(--bg-card2);">
            <div class="kpi-value" style="font-size:1.1rem;">${report.avgHR > 0 ? Math.round(report.avgHR) : '--'}<span class="kpi-unit"> bpm</span></div>
            <div class="kpi-label">FC Media Global</div>
          </div>
          <div class="card kpi" style="background:var(--bg-card2);">
            <div class="kpi-value" style="font-size:1.1rem;">${report.totalElev.toLocaleString()}<span class="kpi-unit"> m</span></div>
            <div class="kpi-label">Desnivel Total</div>
          </div>
        </div>

        <!-- HR Zones -->
        ${report.zones.some(z => z.pct > 0) ? `
        <div class="ai-section">
          <h4>💓 Distribución de Zonas de FC (est. FC Máx: ${report.estMaxHR} bpm)</h4>
          <div class="zone-bar">
            ${report.zones.map(z => `<div style="width:${Math.max(z.pct, 2)}%; background:${z.color};" title="${z.name}: ${z.pct}%"></div>`).join('')}
          </div>
          <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:6px;">
            ${report.zones.map(z => `<div style="font-size:0.7rem; display:flex; align-items:center; gap:4px;">
              <div style="width:8px; height:8px; border-radius:2px; background:${z.color};"></div>
              <span style="color:var(--text-muted);">${z.name}</span>
              <span style="color:var(--text-primary); font-family:'Space Mono'; font-weight:700;">${z.pct}%</span>
            </div>`).join('')}
          </div>
        </div>` : ''}

        <!-- Strengths -->
        ${report.strengths.length > 0 ? `
        <div class="ai-section">
          <h4 style="color:var(--green);">✅ Fortalezas Detectadas</h4>
          ${report.strengths.map(s => `<p style="margin-bottom:6px;">• ${s}</p>`).join('')}
        </div>` : ''}

        <!-- Improvements -->
        ${report.improvements.length > 0 ? `
        <div class="ai-section">
          <h4 style="color:var(--yellow);">⚠️ Áreas de Mejora</h4>
          ${report.improvements.map(s => `<p style="margin-bottom:6px;">• ${s}</p>`).join('')}
        </div>` : ''}

        <!-- Recommendations -->
        <div class="ai-section">
          <h4 style="color:var(--blue);">🎯 Recomendaciones de Entrenamiento</h4>
          ${report.recommendations.map(s => `<p style="margin-bottom:6px;">• ${s}</p>`).join('')}
        </div>

        <!-- Nutrition -->
        <div class="ai-section">
          <h4 style="color:var(--purple);">🥗 Recomendaciones Nutricionales</h4>
          ${report.nutritionAdvice.map(s => `<p style="margin-bottom:6px;">• ${s}</p>`).join('')}
        </div>
      </div>

      <div class="grid-2" style="margin-top:16px;">
        <div class="card">
          <div class="card-title">📈 Evolución de Velocidad Media</div>
          <div class="chart-container"><canvas id="chartAnalysisSpeed"></canvas></div>
        </div>
        <div class="card">
          <div class="card-title">📏 Evolución de Distancia</div>
          <div class="chart-container"><canvas id="chartAnalysisDist"></canvas></div>
        </div>
      </div>
      ${report.avgHR > 0 ? `
      <div class="grid-2">
        <div class="card">
          <div class="card-title">💓 Evolución FC Media</div>
          <div class="chart-container"><canvas id="chartAnalysisHR"></canvas></div>
        </div>
        <div class="card">
          <div class="card-title">⛰️ Desnivel por Actividad</div>
          <div class="chart-container"><canvas id="chartAnalysisElev"></canvas></div>
        </div>
      </div>` : ''}
    </div>
  `;
}

// ============================================================
// CHART INITIALIZATION (post-render)
// ============================================================
function initCharts() {
  const acts = state.activities;
  if (acts.length === 0) return;

  const sorted = [...acts].sort((a,b) => new Date(a.date) - new Date(b.date));
  const labels = sorted.map(a => formatDate(a.date));

  // Dashboard charts
  if (document.getElementById('chartDashDist')) {
    createBarChart('chartDashDist', {
      data: sorted.map(a => a.distance),
      backgroundColor: 'rgba(249,115,22,0.6)',
      borderColor: '#F97316', borderWidth: 1, borderRadius: 6
    }, labels);
  }
  if (document.getElementById('chartDashHR')) {
    // Last activity FC curve with time axis (like Garmin)
    const lastAct = [...acts].sort((a,b) => new Date(b.date) - new Date(a.date))[0];
    if (lastAct && lastAct.hrValues?.length > 0) {
      const tLabels = lastAct.chartTime && lastAct.chartTime.some(t => t !== '') ? lastAct.chartTime : lastAct.hrValues.map((_, i) => i);
      createLineChart('chartDashHR', [{
        label: 'FC (bpm)', data: lastAct.hrValues,
        borderColor: '#EF4444', backgroundColor: 'rgba(239,68,68,0.15)',
        fill: true, borderWidth: 1.5
      }], tLabels);
    }
  }
  if (document.getElementById('chartDashSpeed')) {
    const lastAct = [...acts].sort((a,b) => new Date(b.date) - new Date(a.date))[0];
    if (lastAct && lastAct.speedChart?.length > 0) {
      const tLabels = lastAct.chartTime && lastAct.chartTime.some(t => t !== '') ? lastAct.chartTime : lastAct.speedChart.map((_, i) => i);
      createLineChart('chartDashSpeed', [{
        label: 'Velocidad (km/h)', data: lastAct.speedChart,
        borderColor: '#3B82F6', backgroundColor: 'rgba(59,130,246,0.1)',
        fill: true, borderWidth: 1.5
      }], tLabels);
    }
  }
  if (document.getElementById('chartDashEle')) {
    const lastAct = [...acts].sort((a,b) => new Date(b.date) - new Date(a.date))[0];
    if (lastAct && lastAct.eleChart?.length > 0) {
      const tLabels = lastAct.chartTime && lastAct.chartTime.some(t => t !== '') ? lastAct.chartTime : lastAct.eleChart.map((_, i) => i);
      createLineChart('chartDashEle', [{
        label: 'Elevación (m)', data: lastAct.eleChart,
        borderColor: '#22C55E', backgroundColor: 'rgba(34,197,94,0.15)',
        fill: true, borderWidth: 1.5
      }], tLabels);
    }
  }

  // Analysis charts
  if (document.getElementById('chartAnalysisSpeed')) {
    createLineChart('chartAnalysisSpeed', [{
      label: 'Vel. Media', data: sorted.map(a => a.avgSpeed > 0 ? a.avgSpeed : null),
      borderColor: '#3B82F6', backgroundColor: 'rgba(59,130,246,0.1)',
      fill: true, borderWidth: 2
    }], labels);
  }
  if (document.getElementById('chartAnalysisDist')) {
    createBarChart('chartAnalysisDist', {
      data: sorted.map(a => a.distance),
      backgroundColor: 'rgba(249,115,22,0.6)',
      borderColor: '#F97316', borderWidth: 1, borderRadius: 6
    }, labels);
  }
  if (document.getElementById('chartAnalysisHR')) {
    createLineChart('chartAnalysisHR', [{
      label: 'FC Media', data: sorted.map(a => a.avgHR > 0 ? a.avgHR : null),
      borderColor: '#EF4444', backgroundColor: 'rgba(239,68,68,0.1)',
      fill: true, borderWidth: 2
    }], labels);
  }
  if (document.getElementById('chartAnalysisElev')) {
    createBarChart('chartAnalysisElev', {
      data: sorted.map(a => a.elevGain),
      backgroundColor: 'rgba(34,197,94,0.6)',
      borderColor: '#22C55E', borderWidth: 1, borderRadius: 6
    }, labels);
  }

  // Detail charts
  const a = state.selectedActivity;
  if (!a) return;

  // Use time labels (like Garmin red chart), fallback to distance, fallback to index
  const hasTime = a.chartTime && a.chartTime.some(t => t !== '');
  const hasDist = a.chartDist && a.chartDist.some(t => t !== '');
  const detailLabels = hasTime ? a.chartTime : (hasDist ? a.chartDist.map(d => d ? d + ' km' : '') : a.hrValues?.map((_, i) => i) || []);
  // For tooltip: show both time and distance
  const detailTooltipLabel = (hasTime && hasDist) ? (idx) => {
    const t = a.chartTime[idx] || '';
    const d = a.chartDist[idx] || '';
    return t + (d ? ` · ${d} km` : '');
  } : null;

  const maxLabels = 10; // Show ~10 labels on x-axis for readability

  if (document.getElementById('chartDetailHR') && a.hrValues?.length) {
    createLineChart('chartDetailHR', [{
      label: 'FC (bpm)', data: a.hrValues,
      borderColor: '#EF4444', backgroundColor: 'rgba(239,68,68,0.15)',
      fill: true, borderWidth: 1.5
    }], detailLabels);
  }

  if (document.getElementById('chartDetailSpeed') && a.speedChart?.length) {
    createLineChart('chartDetailSpeed', [{
      label: 'Velocidad (km/h)', data: a.speedChart,
      borderColor: '#3B82F6', backgroundColor: 'rgba(59,130,246,0.1)',
      fill: true, borderWidth: 1.5
    }], detailLabels);
  }

  if (document.getElementById('chartDetailEle') && a.eleChart?.length) {
    createLineChart('chartDetailEle', [{
      label: 'Elevación (m)', data: a.eleChart,
      borderColor: '#22C55E', backgroundColor: 'rgba(34,197,94,0.15)',
      fill: true, borderWidth: 1.5
    }], detailLabels);
  }

  if (document.getElementById('chartDetailPower') && a.powerChart?.length) {
    createLineChart('chartDetailPower', [{
      label: 'Potencia (W)', data: a.powerChart,
      borderColor: '#EAB308', backgroundColor: 'rgba(234,179,8,0.1)',
      fill: true, borderWidth: 1.5
    }], detailLabels);
  }

  if (document.getElementById('chartDetailCad') && a.cadChart?.length) {
    createLineChart('chartDetailCad', [{
      label: 'Cadencia (rpm)', data: a.cadChart,
      borderColor: '#A855F7', backgroundColor: 'rgba(168,85,247,0.1)',
      fill: true, borderWidth: 1.5
    }], detailLabels);
  }

  if (document.getElementById('chartDetailEfficiency') && a.hrValues?.length && a.speedChart?.length) {
    const minLen = Math.min(a.hrValues.length, a.speedChart.length);
    const effLabels = detailLabels.slice(0, minLen);
    createLineChart('chartDetailEfficiency', [
      { label: 'Velocidad (km/h)', data: a.speedChart.slice(0, minLen), borderColor: '#3B82F6', borderWidth: 1.5, yAxisID: 'y1' },
      { label: 'FC (bpm)', data: a.hrValues.slice(0, minLen), borderColor: '#EF4444', borderWidth: 1.5, yAxisID: 'y2' }
    ], effLabels, {
      yAxes: {
        y1: { position: 'left', grid: { color: 'rgba(30,42,62,0.5)' }, ticks: { color: '#3B82F6', font: { family: 'Space Mono', size: 10 } }, title: { display: true, text: 'km/h', color: '#3B82F6' } },
        y2: { position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#EF4444', font: { family: 'Space Mono', size: 10 } }, title: { display: true, text: 'bpm', color: '#EF4444' } },
        x: { display: true, grid: { color: 'rgba(30,42,62,0.3)' }, ticks: { color: '#4A5E7A', font: { size: 10 }, maxTicksLimit: maxLabels } }
      }
    });
  }
}

// ============================================================
// BOOT
// ============================================================
render();

// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW registration failed:', err));
  });
}
</script>
</body>
</html>
